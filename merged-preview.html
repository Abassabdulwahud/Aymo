<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AYMO Notebook</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
:root{--bg:#fff;--panel:#fff;--soft:#f6f6f6;--text:#111;--muted:#666;--border:#ddd}
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.dark{--bg:#0f0f0f;--panel:#171717;--soft:#1f1f1f;--text:#f5f5f5;--muted:#b7b7b7;--border:#313131}
.site{min-height:100vh;padding:20px;background:var(--bg);color:var(--text)}.hide{display:none!important}
.aymo-logo{display:block;max-width:100%;height:auto;object-fit:contain;filter:none;transition:filter .3s ease}
.dark .aymo-logo{filter:invert(1) brightness(1) contrast(1)}
.aymo-logo-lg{width:min(420px,78vw);margin:0 auto 14px}
.aymo-logo-md{width:min(180px,34vw)}
.aymo-logo-sm{width:42px}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}.btn.black{background:var(--text);color:var(--bg);border-color:var(--text)}
.auth{display:flex;justify-content:center;align-items:center;position:relative;min-height:calc(100vh - 40px)}.auth-theme{position:absolute;top:0;right:0}
.auth-card{width:100%;max-width:460px;border:1px solid var(--border);border-radius:18px;background:var(--panel);padding:28px}.auth-logo{text-align:center}.auth-logo h1{margin:0}.auth-logo p{margin:2px 0 10px;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase}.auth-logo h2{margin:0 0 16px;font-size:28px}
.f{display:grid;gap:6px;margin-bottom:10px}.lbl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:10px;background:var(--soft);color:var(--text);padding:11px 12px;font-family:inherit}
.pw{position:relative}.pw input{padding-right:62px}.pw button{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:var(--muted);cursor:pointer}
.link{border:0;background:transparent;color:var(--text);text-decoration:underline;cursor:pointer;padding:0}
.div{display:flex;align-items:center;gap:10px;margin:16px 0}.div span{height:1px;background:var(--border);flex:1}.div strong{font-size:12px;color:var(--muted);letter-spacing:.12em}.sw{text-align:center;color:var(--muted);margin:16px 0 0}
.google-slot{min-height:44px}.social-status{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
.home{display:grid;grid-template-columns:240px 1fr;gap:18px}.sidebar,.main,.panel{border:1px solid var(--border);border-radius:16px;background:var(--panel)}.sidebar{padding:16px}.logo h1{margin:0}.logo p{margin:2px 0 16px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.tag{display:flex;justify-content:space-between;padding:8px 10px;border-radius:10px;cursor:pointer}.tag.active,.tag:hover{background:var(--soft)}.side-act{margin-top:12px;display:grid;gap:8px}
.main{padding:18px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.head h2{margin:4px 0 0;font-size:32px}.ey{margin:0;font-size:12px;color:var(--muted);text-transform:uppercase}
.search{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--soft);margin-bottom:12px;color:var(--text)}.list{display:grid;gap:10px}.card{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--panel);cursor:pointer}
.card .top{display:flex;justify-content:space-between}.badge{font-size:11px;border:1px solid var(--border);border-radius:999px;padding:3px 8px;text-transform:uppercase}.preview{color:var(--muted)}.foot{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.actions{display:flex;gap:8px;margin-top:8px}
.note-top{display:flex;justify-content:space-between;margin-bottom:14px}.grid{display:grid;grid-template-columns:2fr 1.2fr;gap:16px}.panel{padding:16px}textarea{min-height:320px;resize:vertical}.upload{border:1px dashed var(--border);border-radius:12px;background:var(--soft);padding:16px;text-align:center;margin-bottom:10px}.files{display:grid;gap:8px}.file{border:1px solid var(--border);border-radius:10px;padding:8px}.ai{margin-top:16px;border:1px solid var(--border);border-radius:16px;padding:16px}.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.ins{border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px}
.settings{max-width:980px;margin:0 auto}.s-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}.s-title{font-size:32px;margin:6px 0 0}.s-card{border:1px solid var(--border);border-radius:16px;background:var(--panel);padding:8px 16px}.sec{padding:16px 0;border-bottom:1px solid var(--border)}.sec:last-child{border-bottom:0}.row{display:flex;justify-content:space-between;align-items:center}.switch{width:48px;height:28px;border:1px solid var(--border);border-radius:999px;background:var(--soft);padding:2px}.thumb{width:22px;height:22px;border-radius:50%;background:var(--text);display:block;transition:transform .2s ease}.switch.on .thumb{transform:translateX(20px)}.acc{display:flex;justify-content:space-between;margin-bottom:10px}.acc span{color:var(--muted)}
@media(max-width:1024px){.home{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.ai-grid{grid-template-columns:1fr}.head h2,.s-title,.auth-logo h2{font-size:26px}.auth-theme{position:static;margin-bottom:10px}}
</style>
</head>
<body>
<div id="site" class="site">
<section id="auth" class="auth"></section>
<section id="home" class="home hide"><aside class="sidebar"><div class="logo"><img src="./public/aymo-logo-main.png" alt="AYMO Notebook logo" class="aymo-logo aymo-logo-md"></div><div id="tags"></div><div class="side-act"><button class="btn" id="settingsOpen">Settings</button><button class="btn" id="themeBtn">Dark</button></div></aside><section class="main"><div class="head"><div><p class="ey">AYMO Notebook</p><h2>My Notes</h2></div><button class="btn black" id="createBtn">Create Note</button></div><input id="search" class="search" placeholder="Search notes by title or content" /><div id="notes" class="list"></div></section></section>
<section id="note" class="hide"><div class="note-top"><div style="display:flex;align-items:center;gap:10px"><img src="./public/aymo-logo-main.png" alt="AYMO Notebook logo" class="aymo-logo aymo-logo-md"><button class="btn" id="backBtn">Back</button></div><div><button class="btn">Share</button> <button class="btn black">Save</button></div></div><div class="grid"><section class="panel"><label class="lbl">Title</label><input id="noteTitle" /><label class="lbl" style="margin-top:10px">Writing Space</label><textarea id="noteBody"></textarea><div style="margin-top:10px"><button class="btn" id="recordBtn">Record Voice</button></div></section><section class="panel"><h3 style="margin:0 0 10px">Uploads</h3><div class="upload">Drag/drop or browse (preview)</div><div id="uploadList" class="files"></div></section></div><section class="ai"><p class="ey">AI Assistant</p><h3 style="margin:4px 0 0">Insights & Learning Tips</h3><div id="insights" class="ai-grid"></div></section></section>
<section id="settings" class="settings hide"><div class="s-top"><div><div class="logo"><img src="./public/aymo-logo-main.png" alt="AYMO Notebook logo" class="aymo-logo aymo-logo-md"></div><h2 class="s-title">Settings</h2></div><button class="btn" id="settingsBack">Back</button></div><div class="s-card"><div class="sec"><h3>Theme</h3><div class="row"><span>Dark mode</span><button id="settingsTheme" class="switch"><span class="thumb"></span></button></div></div><div class="sec"><h3>Language</h3><label class="lbl">Preferred language</label><select id="language"><option>English</option><option>Arabic</option><option>French</option><option>Spanish</option><option>German</option></select></div><div class="sec"><h3>AI Provider</h3><label style="display:grid;grid-template-columns:18px 1fr;gap:10px;margin-bottom:8px"><input type="radio" name="provider" value="gemini"><div><strong>Google Gemini API</strong><br><small style="color:var(--muted)">Fast and good for multimodal content like images and audio.</small></div></label><label style="display:grid;grid-template-columns:18px 1fr;gap:10px;margin-bottom:8px"><input type="radio" name="provider" value="openai"><div><strong>OpenAI API</strong><br><small style="color:var(--muted)">Offers detailed insights and advanced reasoning.</small></div></label><label style="display:grid;grid-template-columns:18px 1fr;gap:10px"><input type="radio" name="provider" value="deepseek"><div><strong>DeepSeek API</strong><br><small style="color:var(--muted)">Cost-effective and excellent for logical analysis and reasoning tasks.</small></div></label></div><div class="sec"><h3>Account</h3><div class="acc"><span>Name</span><strong>Aya Morgan</strong></div><div class="acc"><span>Email</span><strong>aya@aymo.app</strong></div><button class="btn" id="logout">Logout</button></div></div></section>
</div>
<script>
const API_BASE_URLS = [window.location.origin];
const AUTH_TOKEN_KEY = "aymo.auth.token";
const GOOGLE_SDK_URL = "https://accounts.google.com/gsi/client";
const APPLE_SDK_URL = "https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js";
const scriptCache = new Map();
const tags=["all","research","ideas","work","personal"];
let notes=[{id:"n1",title:"Neuroscience Reading Notes",body:"Attention is selective resource allocation.",tag:"research",pinned:true,updatedAt:"Mar 27, 2026",uploads:["cognitive-load.pdf","lecture-week-3.mp4"]},{id:"n2",title:"Product Redesign Kickoff",body:"Align on metric, review user pain points.",tag:"work",pinned:true,updatedAt:"Mar 26, 2026",uploads:["brief.docx"]},{id:"n3",title:"Voice UI Patterns",body:"Brevity, cadence, and silence are underrated.",tag:"ideas",pinned:false,updatedAt:"Mar 25, 2026",uploads:["interview-audio.m4a"]}];
let selected=notes[0].id,activeTag="all",q="",recording=false,dark=false,languageChoice="English",aiProviderChoice="gemini",authed=false,authMode="login";
let authToken = localStorage.getItem(AUTH_TOKEN_KEY) || "";
let currentUser = { full_name: "Aya Morgan", email: "aya@aymo.app" };
let pendingResetToken = new URLSearchParams(window.location.search).get("resetToken") || "";
if (pendingResetToken) authMode = "reset";
let authProviders = {
  google: { configured: false, enabled: false, clientId: null, reason: "Google sign-in is not configured yet." },
  apple: { configured: false, enabled: false, clientId: null, redirectUri: null, reason: "Apple sign-in is not configured yet." }
};
const site=document.getElementById('site'),home=document.getElementById('home'),note=document.getElementById('note'),settings=document.getElementById('settings'),auth=document.getElementById('auth');
function words(s){return (s.trim().match(/\S+/g)||[]).length} function current(){return notes.find(n=>n.id===selected)||notes[0]}
function applyTheme(){site.classList.toggle('dark',dark);const t=document.getElementById('themeBtn');if(t)t.textContent=dark?'Light':'Dark';const sw=document.getElementById('settingsTheme');if(sw)sw.classList.toggle('on',dark)}
function randomValue(){return window.crypto&&typeof window.crypto.randomUUID==="function"?window.crypto.randomUUID():`${Date.now()}-${Math.random().toString(16).slice(2)}`}
function loadExternalScript(src){
  if(scriptCache.has(src)) return scriptCache.get(src);
  const promise = new Promise((resolve,reject)=>{
    const existing = document.querySelector(`script[src="${src}"]`);
    if(existing){
      if(existing.dataset.loaded==="true"){ resolve(); return; }
      existing.addEventListener("load",()=>resolve(),{once:true});
      existing.addEventListener("error",()=>reject(new Error(`Failed to load ${src}`)),{once:true});
      return;
    }
    const script=document.createElement("script");
    script.src=src;script.async=true;script.defer=true;
    script.addEventListener("load",()=>{script.dataset.loaded="true";resolve();},{once:true});
    script.addEventListener("error",()=>reject(new Error(`Failed to load ${src}`)),{once:true});
    document.head.appendChild(script);
  });
  scriptCache.set(src,promise);
  return promise;
}
try { const p = JSON.parse(localStorage.getItem("aymo.preferences") || "{}"); if (p.aiProvider) aiProviderChoice = p.aiProvider; } catch {}
async function api(path, options = {}) {
  const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
  let lastError = null;

  for (const base of API_BASE_URLS) {
    try {
      const res = await fetch(`${base}${path}`, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.detail || `Request failed (${res.status})`);
      }
      return data;
    } catch (err) {
      // Retry only when the browser could not reach the server at all.
      if (err instanceof TypeError) {
        lastError = err;
        continue;
      }
      throw err;
    }
  }

  if (lastError instanceof Error) throw lastError;
  throw new Error("Request failed");
}
async function loadAuthProviders() {
  try {
    authProviders = await api("/auth/providers");
  } catch {
    authProviders = {
      google: { configured: false, enabled: false, clientId: null, reason: "Could not load Google sign-in configuration." },
      apple: { configured: false, enabled: false, clientId: null, redirectUri: null, reason: "Could not load Apple sign-in configuration." }
    };
  }
}
async function fetchMe() {
  if (!authToken) return null;
  return api("/api/protected/me", {
    headers: {
      Authorization: `Bearer ${authToken}`
    }
  });
}
function saveToken(token) {
  authToken = token;
  localStorage.setItem(AUTH_TOKEN_KEY, token);
}
function clearToken() {
  authToken = "";
  localStorage.removeItem(AUTH_TOKEN_KEY);
}
async function completeSocialAuth(path, token) {
  const login = await api(path, {
    method: "POST",
    body: JSON.stringify({ token })
  });
  saveToken(login.access_token);
  currentUser = await fetchMe();
  authed = true;
  show("home");
}
async function setupGoogleButton() {
  if (!authProviders.google.enabled || !authProviders.google.clientId) return;
  const slot = document.getElementById("googleSlot");
  const errorEl = document.getElementById("authError");
  if (!slot) return;

  try {
    slot.innerHTML = "";
    await loadExternalScript(GOOGLE_SDK_URL);
    if (!window.google || !window.google.accounts || !window.google.accounts.id) {
      throw new Error("Google sign-in could not initialize in this browser.");
    }

    window.google.accounts.id.initialize({
      client_id: authProviders.google.clientId,
      callback: async ({ credential }) => {
        if (!credential) {
          errorEl.textContent = "Google sign-in did not return a usable identity token.";
          return;
        }
        try {
          errorEl.textContent = "";
          await completeSocialAuth("/auth/google", credential);
        } catch (err) {
          errorEl.textContent = `Auth error: ${err && err.message ? err.message : "Google authentication failed."}`;
        }
      }
    });

    window.google.accounts.id.renderButton(slot, {
      theme: dark ? "filled_black" : "outline",
      size: "large",
      text: authMode === "login" ? "signin_with" : "signup_with",
      shape: "rectangular",
      width: 404
    });
  } catch (err) {
    errorEl.textContent = `Auth error: ${err && err.message ? err.message : "Google sign-in could not load."}`;
  }
}
function renderAuth(){
  const googleUi = authProviders.google.enabled
    ? `<div id="googleSlot" class="google-slot"></div>`
    : `<button class="btn" style="width:100%;margin-bottom:4px" id="googleBtn">${authMode==='login'?'Sign in':'Sign up'} with Google</button><p class="social-status">${authProviders.google.reason || "Google sign-in is not configured yet."}</p>`;
  const appleDisabled = authProviders.apple.enabled ? "" : "disabled";
  const appleStatus = authProviders.apple.reason ? `<p class="social-status">${authProviders.apple.reason}</p>` : "";
  const showReset = authMode === "reset";
  auth.innerHTML=`<button class="btn auth-theme" id="authTheme">${dark?'Light Mode':'Dark Mode'}</button><div class="auth-card"><div class="auth-logo"><img src="./public/aymo-logo-main.png" alt="AYMO Notebook logo" class="aymo-logo aymo-logo-lg"><h2>${authMode==='login'?'Welcome back':authMode==='signup'?'Create your account':'Choose a new password'}</h2></div><form id="authForm">${authMode==='signup'?'<div class="f"><label class="lbl">Full name</label><input id="fullName" required></div>':''}${showReset?'':`<div class="f"><label class="lbl">Email</label><input id="authEmail" type="email" required></div>`}<div class="f"><label class="lbl">Password</label><div class="pw"><input id="authPass" type="password" required><button type="button" id="togglePass">Show</button></div></div>${authMode!=='login'?'<div class="f"><label class="lbl">Confirm password</label><input id="confirmPass" type="password" required></div>':''}<button id="authSubmit" class="btn black" style="width:100%;margin-top:4px">${authMode==='login'?'Log In':authMode==='signup'?'Sign Up':'Reset Password'}</button>${authMode==='login'?'<button type="button" class="link" style="margin-top:10px" id="forgotBtn">Forgot password?</button>':''}</form>${showReset?'':`<div class="div"><span></span><strong>OR</strong><span></span></div>${googleUi}<button class="btn" style="width:100%;margin-top:8px" id="appleBtn" ${appleDisabled}>${authMode==='login'?'Sign in':'Sign up'} with Apple</button>${appleStatus}`}<p id="authError" style="margin:10px 0 0;color:#c1121f;font-size:13px"></p><p class="sw">${authMode==='login'?"Don't have an account?":authMode==='signup'?"Already have an account?":"Remembered it?"} <button class="link" id="switchAuth">${authMode==='login'?'Sign up':'Log in'}</button></p></div>`;
  document.getElementById('authTheme').onclick=()=>{dark=!dark;applyTheme();renderAuth();};
  const pass=document.getElementById('authPass'); const toggle=document.getElementById('togglePass');
  toggle.onclick=()=>{const show=pass.type==='password';pass.type=show?'text':'password';toggle.textContent=show?'Hide':'Show';};
  document.getElementById('switchAuth').onclick=()=>{authMode=authMode==='login'?'signup':'login';renderAuth();};
  document.getElementById('authForm').onsubmit=async(e)=>{
    e.preventDefault();
    const errorEl = document.getElementById('authError');
    const submitEl = document.getElementById('authSubmit');
    errorEl.textContent = "";
    submitEl.disabled = true;
      try {
        const fullNameField = document.getElementById('fullName');
        const fullName = fullNameField ? fullNameField.value.trim() : "";
        const emailField = document.getElementById('authEmail');
        const email = emailField ? emailField.value.trim().toLowerCase() : "";
        const password = document.getElementById('authPass').value;
        if(authMode==='signup'){
          const a=password,b=document.getElementById('confirmPass').value;
          if(a!==b){ throw new Error('Passwords do not match.'); }
          if(!fullName){ throw new Error('Full name is required.'); }
          await api("/auth/register", {
            method: "POST",
            body: JSON.stringify({ full_name: fullName, email, password })
          });
        }
        if (authMode === 'reset') {
          const confirm = document.getElementById('confirmPass').value;
          if (password !== confirm) throw new Error('Passwords do not match.');
          if (!pendingResetToken) throw new Error('Password reset link is missing or invalid.');
          const login = await api("/auth/reset-password", {
            method: "POST",
            body: JSON.stringify({ token: pendingResetToken, new_password: password })
          });
          saveToken(login.access_token);
          currentUser = await fetchMe();
          authed=true;
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.delete("resetToken");
          window.history.replaceState({}, "", nextUrl.toString());
          pendingResetToken = "";
          authMode = "login";
          show('home');
          return;
        }
        const login = await api("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password })
        });
        saveToken(login.access_token);
        currentUser = await fetchMe();
        authed=true;
      show('home');
    } catch(err) {
      const message = err && err.message ? err.message : "Authentication failed";
      errorEl.textContent = `Auth error: ${message}`;
    } finally {
      submitEl.disabled = false;
    }
  };
  const googleBtn = document.getElementById('googleBtn');
  if (googleBtn) {
    googleBtn.onclick=async()=>{
      const errorEl = document.getElementById('authError');
      errorEl.textContent = authProviders.google.reason || "Google sign-in is not configured yet.";
    };
  } else {
    void setupGoogleButton();
  }
  const forgotBtn = document.getElementById('forgotBtn');
  if (forgotBtn) {
    forgotBtn.onclick = async () => {
      const errorEl = document.getElementById('authError');
      const email = document.getElementById('authEmail').value.trim().toLowerCase();
      if (!email) {
        errorEl.textContent = "Auth error: Enter your email first so we can reset the right account.";
        return;
      }

      try {
        errorEl.textContent = "";
        const reset = await api("/auth/forgot-password", {
          method: "POST",
          body: JSON.stringify({ email })
        });
        if (reset.reset_token) {
          const newPassword = window.prompt("Development reset token created. Enter a new password:", "");
          if (!newPassword) {
            throw new Error("Password reset was cancelled.");
          }
          const login = await api("/auth/reset-password", {
            method: "POST",
            body: JSON.stringify({ token: reset.reset_token, new_password: newPassword })
          });
          saveToken(login.access_token);
          currentUser = await fetchMe();
          authed = true;
          window.alert("Password updated. You are now signed in.");
          show("home");
          return;
        }
        window.alert(reset.message);
      } catch (err) {
        errorEl.textContent = `Auth error: ${err && err.message ? err.message : "Could not reset password."}`;
      }
    };
  }
  const appleBtn = document.getElementById('appleBtn');
  if (appleBtn) {
    appleBtn.onclick=async()=>{
      const errorEl = document.getElementById('authError');
      if (!authProviders.apple.enabled || !authProviders.apple.clientId || !authProviders.apple.redirectUri) {
        errorEl.textContent = authProviders.apple.reason || "Apple sign-in is not ready in this environment.";
        return;
      }
      try {
        errorEl.textContent = "";
        await loadExternalScript(APPLE_SDK_URL);
        if (!window.AppleID || !window.AppleID.auth) {
          throw new Error("Apple sign-in could not initialize in this browser.");
        }
        window.AppleID.auth.init({
          clientId: authProviders.apple.clientId,
          scope: "name email",
          redirectURI: authProviders.apple.redirectUri,
          usePopup: true,
          state: randomValue(),
          nonce: randomValue()
        });
        const result = await window.AppleID.auth.signIn();
        const token = result && result.authorization ? result.authorization.id_token : "";
        if (!token) throw new Error("Apple sign-in did not return an identity token.");
        await completeSocialAuth("/auth/apple", token);
      } catch (err) {
        errorEl.textContent = `Auth error: ${err && err.message ? err.message : "Apple authentication failed."}`;
      }
    };
  }
}
function renderTags(){const el=document.getElementById('tags');el.innerHTML=tags.map(t=>`<div class="tag ${activeTag===t?'active':''}" data-tag="${t}"><span>${t[0].toUpperCase()+t.slice(1)}</span><span>${t==='all'?notes.length:notes.filter(n=>n.tag===t).length}</span></div>`).join('');[...el.querySelectorAll('.tag')].forEach(x=>x.onclick=()=>{activeTag=x.dataset.tag;renderHome();});}
function renderHome(){renderTags();const filtered=notes.filter(n=>(activeTag==='all'||n.tag===activeTag)&&(!q||(n.title+n.body).toLowerCase().includes(q.toLowerCase())));const el=document.getElementById('notes');el.innerHTML=filtered.map(n=>`<article class="card" data-open="${n.id}"><div class="top"><h3>${n.title}</h3><span class="badge">${n.tag}</span></div><p class="preview">${n.body||'Start writing your note...'}</p><div class="foot"><span>${n.updatedAt}</span><span>${words(n.body)} words</span></div><div class="actions"><button class="btn" data-pin="${n.id}">${n.pinned?'Unpin':'Pin'}</button><button class="btn" data-del="${n.id}">Delete</button></div></article>`).join('')||'<div class="card">No notes found.</div>';[...el.querySelectorAll('[data-open]')].forEach(x=>x.onclick=()=>{selected=x.dataset.open;show('note')});[...el.querySelectorAll('[data-pin]')].forEach(x=>x.onclick=(e)=>{e.stopPropagation();const id=x.dataset.pin;notes=notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n);renderHome();});[...el.querySelectorAll('[data-del]')].forEach(x=>x.onclick=(e)=>{e.stopPropagation();const id=x.dataset.del;if(notes.length>1){notes=notes.filter(n=>n.id!==id);if(selected===id)selected=notes[0].id;}renderHome();});}
function renderNote(){const n=current();noteTitle.value=n.title;noteBody.value=n.body;uploadList.innerHTML=n.uploads.map(f=>`<div class="file">${f}</div>`).join('')||'<div class="file">No uploads yet</div>';const qs=(n.body.match(/\?/g)||[]).length;const providerName=aiProviderChoice==="gemini"?"Google Gemini API":aiProviderChoice==="openai"?"OpenAI API":"DeepSeek API";insights.innerHTML=[[`Provider In Use`,`${providerName} is currently analyzing this note and its uploads.`],[`Live Summary`,`This note has about ${words(n.body)} words and ${n.uploads.length} uploaded resources.`],[`Reasoning Signal`,qs>0?`Detected ${qs} reflective question${qs>1?'s':''}; this improves depth of analysis.`:'Add one question to improve revision and active recall quality.']].map(i=>`<div class="ins"><h4>${i[0]}</h4><p>${i[1]}</p></div>`).join('');}
function renderSettings(){const languageSelect=document.getElementById("language");languageSelect.value=languageChoice;document.querySelectorAll("input[name='provider']").forEach((radio)=>{radio.checked = radio.value === aiProviderChoice;});const nameEl=document.querySelector(".acc:nth-child(1) strong");const emailEl=document.querySelector(".acc:nth-child(2) strong");if(nameEl && currentUser?.full_name) nameEl.textContent=currentUser.full_name; if(emailEl && currentUser?.email) emailEl.textContent=currentUser.email;applyTheme();}
function show(v){auth.classList.add('hide');home.classList.add('hide');note.classList.add('hide');settings.classList.add('hide');if(!authed){auth.classList.remove('hide');renderAuth();return;}if(v==='home'){home.classList.remove('hide');renderHome();}if(v==='note'){note.classList.remove('hide');renderNote();}if(v==='settings'){settings.classList.remove('hide');renderSettings();}}
search.oninput=e=>{q=e.target.value;renderHome()};createBtn.onclick=()=>{const n={id:'n'+Date.now(),title:'Untitled Note',body:'',tag:'ideas',pinned:false,updatedAt:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),uploads:[]};notes.unshift(n);selected=n.id;show('note')};backBtn.onclick=()=>show('home');
noteTitle.oninput=e=>{notes=notes.map(n=>n.id===selected?{...n,title:e.target.value}:n)};noteBody.oninput=e=>{notes=notes.map(n=>n.id===selected?{...n,body:e.target.value}:n);renderNote()};recordBtn.onclick=()=>{if(!recording){recording=true;recordBtn.textContent='Stop Recording';return;}recording=false;recordBtn.textContent='Record Voice';notes=notes.map(n=>n.id===selected?{...n,body:(n.body+'\n\nVoice note: Spaced repetition works better right before forgetting begins.').trim()}:n);renderNote()};
settingsOpen.onclick=()=>show("settings");settingsBack.onclick=()=>show("home");themeBtn.onclick=()=>{dark=!dark;applyTheme()};settingsTheme.onclick=()=>{dark=!dark;applyTheme()};document.getElementById("language").onchange=e=>{languageChoice=e.target.value};document.querySelectorAll("input[name='provider']").forEach((radio)=>{radio.onchange=(event)=>{aiProviderChoice=event.target.value;localStorage.setItem("aymo.preferences", JSON.stringify({ aiProvider: aiProviderChoice }));};});logout.onclick=()=>{authed=false;authMode="login";clearToken();show("auth")};
async function bootstrapAuth(){
  applyTheme();
  await loadAuthProviders();
  if(!authToken){ show('auth'); return; }
  try{
    currentUser = await fetchMe();
    authed = true;
    show('home');
  }catch{
    clearToken();
    authed = false;
    show('auth');
  }
}
bootstrapAuth();
</script>
</body>
</html>
