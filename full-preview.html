<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AYMO Notebook</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
:root{--bg:#fff;--panel:#fff;--soft:#f6f6f6;--text:#111;--muted:#666;--border:#ddd}
*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
.dark{--bg:#0f0f0f;--panel:#171717;--soft:#1f1f1f;--text:#f5f5f5;--muted:#b7b7b7;--border:#313131}
.site{min-height:100vh;padding:20px;background:var(--bg);color:var(--text)}.hide{display:none!important}
.btn{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}.btn.black{background:var(--text);color:var(--bg);border-color:var(--text)}
.auth{display:flex;justify-content:center;align-items:center;position:relative;min-height:calc(100vh - 40px)}.auth-theme{position:absolute;top:0;right:0}
.auth-card{width:100%;max-width:460px;border:1px solid var(--border);border-radius:18px;background:var(--panel);padding:28px}.auth-logo{text-align:center}.auth-logo h1{margin:0}.auth-logo p{margin:2px 0 10px;color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase}.auth-logo h2{margin:0 0 16px;font-size:28px}
.f{display:grid;gap:6px;margin-bottom:10px}.lbl{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}input,textarea,select{width:100%;border:1px solid var(--border);border-radius:10px;background:var(--soft);color:var(--text);padding:11px 12px;font-family:inherit}
.pw{position:relative}.pw input{padding-right:62px}.pw button{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:var(--muted);cursor:pointer}
.link{border:0;background:transparent;color:var(--text);text-decoration:underline;cursor:pointer;padding:0}
.div{display:flex;align-items:center;gap:10px;margin:16px 0}.div span{height:1px;background:var(--border);flex:1}.div strong{font-size:12px;color:var(--muted);letter-spacing:.12em}.sw{text-align:center;color:var(--muted);margin:16px 0 0}
.home{display:grid;grid-template-columns:240px 1fr;gap:18px}.sidebar,.main,.panel{border:1px solid var(--border);border-radius:16px;background:var(--panel)}.sidebar{padding:16px}.logo h1{margin:0}.logo p{margin:2px 0 16px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.tag{display:flex;justify-content:space-between;padding:8px 10px;border-radius:10px;cursor:pointer}.tag.active,.tag:hover{background:var(--soft)}.side-act{margin-top:12px;display:grid;gap:8px}
.main{padding:18px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.head h2{margin:4px 0 0;font-size:32px}.ey{margin:0;font-size:12px;color:var(--muted);text-transform:uppercase}
.search{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--soft);margin-bottom:12px;color:var(--text)}.list{display:grid;gap:10px}.card{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--panel);cursor:pointer}
.card .top{display:flex;justify-content:space-between}.badge{font-size:11px;border:1px solid var(--border);border-radius:999px;padding:3px 8px;text-transform:uppercase}.preview{color:var(--muted)}.foot{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.actions{display:flex;gap:8px;margin-top:8px}
.note-top{display:flex;justify-content:space-between;margin-bottom:14px}.grid{display:grid;grid-template-columns:2fr 1.2fr;gap:16px}.panel{padding:16px}textarea{min-height:320px;resize:vertical}.upload{border:1px dashed var(--border);border-radius:12px;background:var(--soft);padding:16px;text-align:center;margin-bottom:10px}.files{display:grid;gap:8px}.file{border:1px solid var(--border);border-radius:10px;padding:8px}.ai{margin-top:16px;border:1px solid var(--border);border-radius:16px;padding:16px}.ai-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}.ins{border:1px solid var(--border);border-radius:10px;background:var(--soft);padding:10px}
.settings{max-width:980px;margin:0 auto}.s-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}.s-title{font-size:32px;margin:6px 0 0}.s-card{border:1px solid var(--border);border-radius:16px;background:var(--panel);padding:8px 16px}.sec{padding:16px 0;border-bottom:1px solid var(--border)}.sec:last-child{border-bottom:0}.row{display:flex;justify-content:space-between;align-items:center}.switch{width:48px;height:28px;border:1px solid var(--border);border-radius:999px;background:var(--soft);padding:2px}.thumb{width:22px;height:22px;border-radius:50%;background:var(--text);display:block;transition:transform .2s ease}.switch.on .thumb{transform:translateX(20px)}.acc{display:flex;justify-content:space-between;margin-bottom:10px}.acc span{color:var(--muted)}
@media(max-width:1024px){.home{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.ai-grid{grid-template-columns:1fr}.head h2,.s-title,.auth-logo h2{font-size:26px}.auth-theme{position:static;margin-bottom:10px}}
</style>
</head>
<body>
<div id="site" class="site">
<section id="auth" class="auth"></section>
<section id="home" class="home hide"><aside class="sidebar"><div class="logo"><h1>AYMO</h1><p>Notebook</p></div><div id="tags"></div><div class="side-act"><button class="btn" id="settingsOpen">Settings</button><button class="btn" id="themeBtn">Dark</button></div></aside><section class="main"><div class="head"><div><p class="ey">AYMO Notebook</p><h2>My Notes</h2></div><button class="btn black" id="createBtn">Create Note</button></div><input id="search" class="search" placeholder="Search notes by title or content" /><div id="notes" class="list"></div></section></section>
<section id="note" class="hide"><div class="note-top"><button class="btn" id="backBtn">Back</button><div><button class="btn">Share</button> <button class="btn black">Save</button></div></div><div class="grid"><section class="panel"><label class="lbl">Title</label><input id="noteTitle" /><label class="lbl" style="margin-top:10px">Writing Space</label><textarea id="noteBody"></textarea><div style="margin-top:10px"><button class="btn" id="recordBtn">Record Voice</button></div></section><section class="panel"><h3 style="margin:0 0 10px">Uploads</h3><div class="upload">Drag/drop or browse (preview)</div><div id="uploadList" class="files"></div></section></div><section class="ai"><p class="ey">AI Assistant</p><h3 style="margin:4px 0 0">Insights & Learning Tips</h3><div id="insights" class="ai-grid"></div></section></section>
<section id="settings" class="settings hide"><div class="s-top"><div><div class="logo"><h1>AYMO</h1><p>Notebook</p></div><h2 class="s-title">Settings</h2></div><button class="btn" id="settingsBack">Back</button></div><div class="s-card"><div class="sec"><h3>Theme</h3><div class="row"><span>Dark mode</span><button id="settingsTheme" class="switch"><span class="thumb"></span></button></div></div><div class="sec"><h3>Language</h3><label class="lbl">Preferred language</label><select id="language"><option>English</option><option>Arabic</option><option>French</option><option>Spanish</option><option>German</option></select></div><div class="sec"><h3>Account</h3><div class="acc"><span>Name</span><strong>Aya Morgan</strong></div><div class="acc"><span>Email</span><strong>aya@aymo.app</strong></div><button class="btn" id="logout">Logout</button></div></div></section>
</div>
<script>
const tags=["all","research","ideas","work","personal"];
let notes=[{id:"n1",title:"Neuroscience Reading Notes",body:"Attention is selective resource allocation.",tag:"research",pinned:true,updatedAt:"Mar 27, 2026",uploads:["cognitive-load.pdf","lecture-week-3.mp4"]},{id:"n2",title:"Product Redesign Kickoff",body:"Align on metric, review user pain points.",tag:"work",pinned:true,updatedAt:"Mar 26, 2026",uploads:["brief.docx"]},{id:"n3",title:"Voice UI Patterns",body:"Brevity, cadence, and silence are underrated.",tag:"ideas",pinned:false,updatedAt:"Mar 25, 2026",uploads:["interview-audio.m4a"]}];
let selected=notes[0].id,activeTag="all",q="",recording=false,dark=false,languageChoice="English",authed=false,authMode="login";
const site=document.getElementById('site'),home=document.getElementById('home'),note=document.getElementById('note'),settings=document.getElementById('settings'),auth=document.getElementById('auth');
function words(s){return (s.trim().match(/\S+/g)||[]).length} function current(){return notes.find(n=>n.id===selected)||notes[0]}
function applyTheme(){site.classList.toggle('dark',dark);const t=document.getElementById('themeBtn');if(t)t.textContent=dark?'Light':'Dark';const sw=document.getElementById('settingsTheme');if(sw)sw.classList.toggle('on',dark)}
function renderAuth(){
  auth.innerHTML=`<button class="btn auth-theme" id="authTheme">${dark?'Light Mode':'Dark Mode'}</button><div class="auth-card"><div class="auth-logo"><h1>AYMO</h1><p>Notebook</p><h2>${authMode==='login'?'Welcome back':'Create your account'}</h2></div><form id="authForm">${authMode==='signup'?'<div class="f"><label class="lbl">Full name</label><input id="fullName" required></div>':''}<div class="f"><label class="lbl">Email</label><input id="authEmail" type="email" required></div><div class="f"><label class="lbl">Password</label><div class="pw"><input id="authPass" type="password" required><button type="button" id="togglePass">Show</button></div></div>${authMode==='signup'?'<div class="f"><label class="lbl">Confirm password</label><input id="confirmPass" type="password" required></div>':''}<button class="btn black" style="width:100%;margin-top:4px">${authMode==='login'?'Log In':'Sign Up'}</button>${authMode==='login'?'<button type="button" class="link" style="margin-top:10px">Forgot password?</button>':''}</form><div class="div"><span></span><strong>OR</strong><span></span></div><button class="btn" style="width:100%;margin-bottom:8px" id="googleBtn">${authMode==='login'?'Sign in':'Sign up'} with Google</button><button class="btn" style="width:100%" id="appleBtn">${authMode==='login'?'Sign in':'Sign up'} with Apple</button><p class="sw">${authMode==='login'?"Don't have an account?":"Already have an account?"} <button class="link" id="switchAuth">${authMode==='login'?'Sign up':'Log in'}</button></p></div>`;
  document.getElementById('authTheme').onclick=()=>{dark=!dark;applyTheme();renderAuth();};
  const pass=document.getElementById('authPass'); const toggle=document.getElementById('togglePass');
  toggle.onclick=()=>{const show=pass.type==='password';pass.type=show?'text':'password';toggle.textContent=show?'Hide':'Show';};
  document.getElementById('switchAuth').onclick=()=>{authMode=authMode==='login'?'signup':'login';renderAuth();};
  document.getElementById('authForm').onsubmit=(e)=>{e.preventDefault();if(authMode==='signup'){const a=document.getElementById('authPass').value,b=document.getElementById('confirmPass').value;if(a!==b){alert('Passwords do not match.');return;}}authed=true;show('home');};
  document.getElementById('googleBtn').onclick=()=>{authed=true;show('home');};
  document.getElementById('appleBtn').onclick=()=>{authed=true;show('home');};
}
function renderTags(){const el=document.getElementById('tags');el.innerHTML=tags.map(t=>`<div class="tag ${activeTag===t?'active':''}" data-tag="${t}"><span>${t[0].toUpperCase()+t.slice(1)}</span><span>${t==='all'?notes.length:notes.filter(n=>n.tag===t).length}</span></div>`).join('');[...el.querySelectorAll('.tag')].forEach(x=>x.onclick=()=>{activeTag=x.dataset.tag;renderHome();});}
function renderHome(){renderTags();const filtered=notes.filter(n=>(activeTag==='all'||n.tag===activeTag)&&(!q||(n.title+n.body).toLowerCase().includes(q.toLowerCase())));const el=document.getElementById('notes');el.innerHTML=filtered.map(n=>`<article class="card" data-open="${n.id}"><div class="top"><h3>${n.title}</h3><span class="badge">${n.tag}</span></div><p class="preview">${n.body||'Start writing your note...'}</p><div class="foot"><span>${n.updatedAt}</span><span>${words(n.body)} words</span></div><div class="actions"><button class="btn" data-pin="${n.id}">${n.pinned?'Unpin':'Pin'}</button><button class="btn" data-del="${n.id}">Delete</button></div></article>`).join('')||'<div class="card">No notes found.</div>';[...el.querySelectorAll('[data-open]')].forEach(x=>x.onclick=()=>{selected=x.dataset.open;show('note')});[...el.querySelectorAll('[data-pin]')].forEach(x=>x.onclick=(e)=>{e.stopPropagation();const id=x.dataset.pin;notes=notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n);renderHome();});[...el.querySelectorAll('[data-del]')].forEach(x=>x.onclick=(e)=>{e.stopPropagation();const id=x.dataset.del;if(notes.length>1){notes=notes.filter(n=>n.id!==id);if(selected===id)selected=notes[0].id;}renderHome();});}
function renderNote(){const n=current();noteTitle.value=n.title;noteBody.value=n.body;uploadList.innerHTML=n.uploads.map(f=>`<div class="file">${f}</div>`).join('')||'<div class="file">No uploads yet</div>';const qs=(n.body.match(/\?/g)||[]).length;insights.innerHTML=[[`Live Summary`,`This note has about ${words(n.body)} words and ${n.uploads.length} uploaded resources.`],[`Comprehension Signal`,qs>0?`You ask ${qs} reflective question${qs>1?'s':''}.`:'Add one question for better recall.'],[`Learning Tip`,`After each upload, add a 3-line recap in your own words.`]].map(i=>`<div class="ins"><h4>${i[0]}</h4><p>${i[1]}</p></div>`).join('');}
function renderSettings(){const languageSelect=document.getElementById("language");languageSelect.value=languageChoice;applyTheme();}
function show(v){auth.classList.add('hide');home.classList.add('hide');note.classList.add('hide');settings.classList.add('hide');if(!authed){auth.classList.remove('hide');renderAuth();return;}if(v==='home'){home.classList.remove('hide');renderHome();}if(v==='note'){note.classList.remove('hide');renderNote();}if(v==='settings'){settings.classList.remove('hide');renderSettings();}}
search.oninput=e=>{q=e.target.value;renderHome()};createBtn.onclick=()=>{const n={id:'n'+Date.now(),title:'Untitled Note',body:'',tag:'ideas',pinned:false,updatedAt:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),uploads:[]};notes.unshift(n);selected=n.id;show('note')};backBtn.onclick=()=>show('home');
noteTitle.oninput=e=>{notes=notes.map(n=>n.id===selected?{...n,title:e.target.value}:n)};noteBody.oninput=e=>{notes=notes.map(n=>n.id===selected?{...n,body:e.target.value}:n);renderNote()};recordBtn.onclick=()=>{if(!recording){recording=true;recordBtn.textContent='Stop Recording';return;}recording=false;recordBtn.textContent='Record Voice';notes=notes.map(n=>n.id===selected?{...n,body:(n.body+'\n\nVoice note: Spaced repetition works better right before forgetting begins.').trim()}:n);renderNote()};
settingsOpen.onclick=()=>show("settings");settingsBack.onclick=()=>show("home");themeBtn.onclick=()=>{dark=!dark;applyTheme()};settingsTheme.onclick=()=>{dark=!dark;applyTheme()};document.getElementById("language").onchange=e=>{languageChoice=e.target.value};logout.onclick=()=>{authed=false;authMode="login";show("auth")};
applyTheme();show('auth');
</script>
</body>
</html>
